<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
  }

  .pdf-container {
    position: fixed;
    inset: 0;
  }

  object {
    width: 100%;
    height: 100%;
  }

  .fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: sans-serif;
  }

  a {
    color: #4da3ff;
  }
</style>
</head>

<body>

<div class="pdf-container">
  <object data="document.pdf" type="application/pdf">
    <div class="fallback">
      <p>
        Your browser cannot display the PDF.  
        <a href="document.pdf">Download it here</a>.
      </p>
    </div>
  </object>
</div>

</body>
</html>
